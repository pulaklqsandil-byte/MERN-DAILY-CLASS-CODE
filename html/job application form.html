<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

form{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-image: url('https://cdna.artstation.com/p/marketplace/presentation_assets/003/430/266/large/file.jpg?1706950306');
}

fieldset{
    backdrop-filter: blur(50px);
        border-radius: 50px;
        padding: 50px;

}



        label{color: aliceblue;
            font-size: 20px;
            font-weight: bold;
            font-style: oblique;
            margin-right: 20px;

        }

        button{
            padding:10px 30px;
            background-color:burlywood;
            font-weight:bold;
            font-style: italic;
            font-family: monospace;
            border-radius: 8px;
        }

        h1{
            text-align: center;
            color:transparent;
            background-image: linear-gradient(blue, red);
            background-clip: text;
            font-size: 40px;
        }
        
    </style>
</head>
<body>
    <form action="" method="post">
        <fieldset>
            <h1>job application form </h1>
            <label for="fname">first name: </label>
            <input type="text" id="fname" maxlength="8" minlength="3" required placeholder="enter first name">
            
            <br><br>
             <label for="lname">last name: </label>
            <input type="text" id="lname" maxlength="5" minlength="3" required placeholder="enter first name">
            <br><br>
            
             <label for="email">email: </label>
            <input type="email" id="email" maxlength="5" minlength="3" required placeholder=" enter email">
            <br><br>

             <label for="phno">phno: </label>
            <input type="tel"  pattern="[6-9]{1}[0-9]{9}"   id="phno"  required placeholder="+91">
            <br><br>

             <label for="state">state:</label>
             <select name="" id="state">
                <option value="ap">ap</option>
                <option value="up">up</option>
                <option value="mp">mp</option>
                <option value="kp">kp</option>
                <option value="kl">kl</option>
             </select>
            <br><br> 

            <label for="address">Address:</label>
            <textarea name="" rows="3" cols="30" id="address" placeholder="enetr full address"></textarea>
            <br><br>

            <label for="dob">dob:</label>
            <input type="date"  id="dob">

            <label for="skills">skills</label>
            <select name="" id="skills">
                <option value="java">java</option>
                <option value="react">react</option>
                <option value="monodp">monodp<option>
                <option value="c">c</option>
                <option value="c++">c++</option>
             </select>
             <br><br>

             

            
            <button type="submit">sumbit</button>
            
            



        </fieldset>
    </form>
    
</body>
</html>
